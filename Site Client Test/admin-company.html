<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1e293b" />

    <title>Paramètres – Informations entreprise</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, Arial;
        background: #f4f6fb;
        color: #111;
      }
      .container {
        max-width: 600px;
        margin: auto;
        padding: 16px;
      }
      h2 {
        margin-bottom: 16px;
      }
      .card {
        background: #fff;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 10px;
        border: 1px solid #ddd;
        font-size: 16px;
        transition: all 0.2s ease;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #0b5cff;
        box-shadow: 0 0 0 2px rgba(11, 92, 255, 0.2);
      }
      button {
        padding: 12px 18px;
        border-radius: 12px;
        border: none;
        background: #0b5cff;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      button:hover {
        transform: scale(1.03);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      }
      .message {
        margin-top: 8px;
        color: green;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>🏢 Informations entreprise</h2>
      <div class="card">
        <label for="siteName">Nom de l'entreprise</label>
        <input id="siteName" placeholder="Ex: Ma Boutique" />

        <label for="whatsappNumber">Numéro WhatsApp</label>
        <input id="whatsappNumber" placeholder="Ex: 2376XXXXXXXX" />

        <label for="whatsappText">Texte bouton WhatsApp</label>
        <input id="whatsappText" placeholder="Ex: Contacter via WhatsApp" />

        <label for="whatsappQuestion">Question pré-remplie WhatsApp</label>
        <input
          id="whatsappQuestion"
          placeholder="Ex: Je voudrais commander ce produit"
        />

        <label for="callNumber">Numéro d'appel</label>
        <input id="callNumber" placeholder="Ex: 2376XXXXXXXX" />

        <!-- NOUVEAUX CHAMPS -->
        <label for="productType">Que vendez-vous ?</label>
        <select id="productType">
          <option value="produit">Produit</option>
          <option value="service">Service</option>
        </select>

        <label for="formType">Formulaire de contact</label>
        <select id="formType">
          <option value="rendezvous">Rendez-vous</option>
          <option value="livraison">Livraison / RDV</option>
        </select>

        <button id="saveBtn">💾 Enregistrer</button>
        <div id="msg" class="message"></div>
      </div>
    </div>

    <script>
      // Empêcher accès sans connexion
      const user = JSON.parse(localStorage.getItem("currentUser"));

      if (!user) {
        window.location.href = "auth.html";
      }
      const settings = JSON.parse(localStorage.getItem("siteSettings") || "{}");

      // Charger les valeurs existantes
      document.getElementById("siteName").value = settings.siteName || "";
      document.getElementById("whatsappNumber").value =
        settings.whatsappNumber || "";
      document.getElementById("whatsappText").value =
        settings.whatsappText || "";
      document.getElementById("whatsappQuestion").value =
        settings.whatsappQuestion || "";
      document.getElementById("callNumber").value = settings.callNumber || "";

      document.getElementById("productType").value =
        settings.productType || "produit";
      document.getElementById("formType").value =
        settings.formType || "rendezvous";

      const msg = document.getElementById("msg");

      document.getElementById("saveBtn").onclick = () => {
        settings.siteName = document.getElementById("siteName").value.trim();
        settings.whatsappNumber = document
          .getElementById("whatsappNumber")
          .value.trim();
        settings.whatsappText = document
          .getElementById("whatsappText")
          .value.trim();
        settings.whatsappQuestion = document
          .getElementById("whatsappQuestion")
          .value.trim();
        settings.callNumber = document
          .getElementById("callNumber")
          .value.trim();
        settings.productType = document.getElementById("productType").value;
        settings.formType = document.getElementById("formType").value;

        localStorage.setItem("siteSettings", JSON.stringify(settings));

        msg.textContent = "✅ Paramètres enregistrés!";
        setTimeout(() => (msg.textContent = ""), 3000);
      };
    </script>
  </body>
</html>
