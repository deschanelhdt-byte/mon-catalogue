<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1e293b" />

    <style>
      body {
        margin: 0;
        font-family: system-ui;
        background: #0f172a;
        color: white;
      }

      header {
        padding: 14px;
        background: #1e293b;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .back {
        cursor: pointer;
        font-size: 20px;
      }

      .container {
        padding: 16px;
      }

      /* INPUT */
      .input {
        margin-bottom: 16px;
      }

      .input label {
        font-size: 12px;
        opacity: 0.7;
        display: block;
        margin-bottom: 6px;
      }

      .input input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 255, 255, 0.08);
        color: white;
      }

      /* DECONNEXION */
      .logout {
        margin-top: 30px;
        text-align: center;
        font-weight: 600;
        color: #ef4444;
        cursor: pointer;
      }

      .input-box {
        position: relative;
      }

      .input-box input {
        padding-right: 80px; /* espace pour le bouton */
      }

      .edit-text {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 12px;
        color: #3b82f6;
        cursor: pointer;
      }

      .popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        background: rgba(0, 0, 0, 0.6);

        display: none;
        justify-content: center;
        align-items: center;
      }

      .popup-content {
        width: 90%;
        max-width: 320px;

        background: #1e293b;
        padding: 20px;
        border-radius: 16px;

        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .popup-content input {
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 255, 255, 0.08);
        color: white;
      }

      .popup-content button {
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #22c55e;
        color: white;
        font-weight: bold;
      }

      .close {
        text-align: center;
        font-size: 12px;
        opacity: 0.6;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="back" onclick="back()">⬅️</div>
      <b>Infos compte</b>
    </header>

    <div class="container">
      <div class="input">
        <label>Nom</label>
        <input id="name" />
      </div>

      <div class="input">
        <label>Email</label>

        <div class="input-box">
          <input id="email" disabled />
          <span class="edit-text" onclick="enableEdit()">Modifier</span>
        </div>
      </div>

      <!-- 🔥 TEXTE DECONNEXION -->
      <div class="logout" onclick="logout()">Déconnexion</div>
    </div>

    <script>
      const user = JSON.parse(localStorage.getItem("currentUser"));

      if (!user) {
        location.href = "auth.html";
      }

      document.getElementById("name").value = user.name || "";
      document.getElementById("email").value = user.email || "";

      // 🔥 déconnexion
      function logout() {
        localStorage.removeItem("currentUser");
        location.href = "auth.html";
      }

      function back() {
        location.href = "dashboard.html";
      }

      // 🔒 Fonction pour masquer email
      function maskEmail(email) {
        const [name, domain] = email.split("@");

        if (name.length <= 2) return email;

        const first = name[0];
        const last = name[name.length - 1];
        const hidden = "*".repeat(name.length - 2);

        return first + hidden + last + "@" + domain;
      }

      // afficher email masqué
      document.getElementById("email").value = maskEmail(user.email || "");

      // activer modification

      // ouvrir popup
      function enableEdit() {
        document.getElementById("popup").style.display = "flex";
      }

      // fermer popup
      function closePopup() {
        document.getElementById("popup").style.display = "none";
      }

      // changer email
      function changeEmail() {
        const oldEmail = document.getElementById("oldEmail").value;
        const newEmail = document.getElementById("newEmail").value;

        if (oldEmail !== user.email) {
          alert("❌ Ancien email incorrect");
          return;
        }

        if (!newEmail.includes("@")) {
          alert("❌ Email invalide");
          return;
        }

        user.email = newEmail;
        localStorage.setItem("currentUser", JSON.stringify(user));

        document.getElementById("email").value = maskEmail(newEmail);

        alert("✅ Email modifié");
        closePopup();
      }
    </script>

    <div id="popup" class="popup">
      <div class="popup-content">
        <h3>Modifier email</h3>

        <input id="oldEmail" placeholder="Ancien email" />
        <input id="newEmail" placeholder="Nouveau email" />

        <button onclick="changeEmail()">Valider</button>

        <div class="close" onclick="closePopup()">Annuler</div>
      </div>
    </div>
  </body>
</html>
