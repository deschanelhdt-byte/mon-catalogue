<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1e293b" />

    <title>Mon panier</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui;
        background: var(--bg);
        color: var(--text);
      }
      header {
        position: sticky;
        top: 0;
        background: var(--headerBg);
        color: var(--headerText);
        padding: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      header h1 {
        margin: 0;
        font-size: 18px;
        flex: 1;
        text-align: center;
      }
      .back {
        border: none;
        background: transparent;
        color: white;
        font-size: 20px;
        cursor: pointer;
      }
      .container {
        padding: 14px;
      }
      .cart-item {
        background: var(--cardBg);
        color: var(--text);
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 12px;
        display: flex;
        gap: 10px;
        align-items: center;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
      }
      .cart-item img {
        width: 70px;
        height: 70px;
        object-fit: cover;
        border-radius: 8px;
      }
      .info {
        flex: 1;
      }
      .name {
        font-weight: 600;
        margin-bottom: 4px;
      }
      .price {
        font-size: 14px;
        color: var(--text);
        opacity: 0.8;
      }
      .qty {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
      }
      .qty button {
        width: 28px;
        height: 28px;
        border: none;
        border-radius: 6px;
        background: var(--buttonBg);
        color: var(--buttonText);
        cursor: pointer;
      }
      .remove {
        font-size: 20px;
        cursor: pointer;
      }
      .empty {
        text-align: center;
        margin-top: 60px;
        color: #777;
      }

      .order-btn,
      #totalBtn {
        position: fixed;
        border: none;
        border-radius: 50px;
        padding: 16px 22px;
        font-size: 16px;
        font-weight: 600;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
        cursor: pointer;
      }
      .order-btn {
        bottom: 20px;
        right: 20px;
        background: var(--whatsappColor);
        color: white;
      }
      #totalBtn {
        bottom: 20px;
        left: 20px;
        background: var(--primary);
        color: white;
        cursor: default;
      }

      /* POPUPS */
      .popup-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9000;
        display: none;
      }
      .popup-box {
        background: var(--cardBg);
        color: var(--text);
        border-radius: 16px;
        padding: 20px;
        width: 90%;
        max-width: 400px;
      }
      .popup-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 700;
        margin-bottom: 10px;
      }
      .popup-header .popup-close {
        cursor: pointer;
      }
      .popup-content label {
        display: block;
        margin-top: 8px;
        font-weight: 600;
      }
      .popup-content input {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
      .popup-content button {
        margin-top: 12px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 50px;
        background: #25d366;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      input {
        background: var(--cardBg);
        color: var(--text);
      }
    </style>
  </head>

  <body>
    <header>
      <button class="back" onclick="history.back()">←</button>
      <h1>Mon panier</h1>
    </header>

    <div class="container" id="cartList"></div>

    <button class="order-btn" id="orderBtn"></button>
    <button id="totalBtn"></button>

    <!-- POPUP DELIVERY -->
    <div id="popupDelivery" class="popup-overlay">
      <div class="popup-box">
        <div class="popup-header">
          <span>Informations de livraison</span>
          <span class="popup-close" onclick="closePopup('popupDelivery')"
            >✕</span
          >
        </div>
        <div class="popup-content">
          <label>Nom</label><input id="deliveryName" type="text" />
          <label>Numéro</label><input id="deliveryPhone" type="text" />
          <label>Pays</label><input id="deliveryCountry" type="text" />
          <label>Adresse</label><input id="deliveryAddress" type="text" />
          <label>Heure de livraison / RDV</label
          ><input id="deliveryTime" type="text" />
          <button onclick="sendWhatsApp('delivery')">Envoyer WhatsApp</button>
        </div>
      </div>
    </div>

    <!-- POPUP APPOINTMENT -->
    <div id="popupAppointment" class="popup-overlay">
      <div class="popup-box">
        <div class="popup-header">
          <span>Informations rendez-vous</span>
          <span class="popup-close" onclick="closePopup('popupAppointment')"
            >✕</span
          >
        </div>
        <div class="popup-content">
          <label>Nom</label><input id="appointmentName" type="text" />
          <label>Numéro</label><input id="appointmentPhone" type="text" />
          <label>Pays</label><input id="appointmentCountry" type="text" />
          <label>Date et heure RDV</label
          ><input id="appointmentDateTime" type="text" />
          <button onclick="sendWhatsApp('appointment')">
            Envoyer WhatsApp
          </button>
        </div>
      </div>
    </div>

    <script src="theme.js"></script>
    <script>
      // Empêcher accès sans connexion
      const user = JSON.parse(localStorage.getItem("currentUser"));

      if (!user) {
        window.location.href = "auth.html";
      }
      document.addEventListener("DOMContentLoaded", () => {
        applyTheme();
      });

      applyTheme();

      const settings = JSON.parse(localStorage.getItem("siteSettings") || "{}");
      let cart = JSON.parse(localStorage.getItem("cart") || "[]");

      function render() {
        const box = document.getElementById("cartList");
        const totalBtn = document.getElementById("totalBtn");
        const orderBtn = document.getElementById("orderBtn");

        if (cart.length === 0) {
          box.innerHTML = `<div class="empty">Panier vide</div>`;
          totalBtn.style.display = orderBtn.style.display = "none";
          return;
        }

        orderBtn.style.display = totalBtn.style.display = "block";
        orderBtn.textContent = settings.whatsappText || "Commander WhatsApp";

        let total = 0;
        box.innerHTML = cart
          .map((p, i) => {
            const qty = p.qty || 1;

            // Prix effectif
            let effectivePrice = p.price;

            // Texte à afficher
            const priceText =
              effectivePrice != null
                ? effectivePrice + " FCFA"
                : "Prix sur demande";

            // Sous-total : si prix null => 0
            const subtotal = effectivePrice != null ? effectivePrice * qty : 0;
            total += subtotal;

            return `<div class="cart-item">
        <img src="${p.img}">
        <div class="info">
          <div class="name">${p.name}</div>
          <div class="price">${priceText}</div>
          <div class="qty">
            <button onclick="minus(${i})">-</button>
            <span>${qty}</span>
            <button onclick="plus(${i})">+</button>
          </div>
          <div class="subtotal" style="font-size:13px; opacity:0.7;">
            Sous-total: ${subtotal} FCFA
          </div>
       </div>
       <div class="remove" onclick="removeItem(${i})">🗑</div>
     </div>`;
          })
          .join("");

        totalBtn.textContent = `Total estimé : ${total} FCFA`;
      }

      function plus(i) {
        if (!cart[i].qty) cart[i].qty = 1;
        cart[i].qty++;
        save();
      }

      function minus(i) {
        if (!cart[i].qty) cart[i].qty = 1;
        cart[i].qty--;
        if (cart[i].qty <= 0) cart.splice(i, 1);
        save();
      }

      function removeItem(i) {
        cart.splice(i, 1);
        save();
      }

      function save() {
        localStorage.setItem("cart", JSON.stringify(cart));
        render();
        updateCartCount(); // <-- Met à jour le badge du panier
      }

      // OUVRIR LE BON POPUP SELON formType
      document.getElementById("orderBtn").onclick = () => {
        if (settings.formType === "livraison")
          document.getElementById("popupDelivery").style.display = "flex";
        else document.getElementById("popupAppointment").style.display = "flex";
      };

      function closePopup(id) {
        document.getElementById(id).style.display = "none";
      }

      // ENVOI WhatsApp
      function sendWhatsApp(type) {
        let msg = (settings.whatsappQuestion || "Bonjour") + "%0A%0A";
        let total = 0;

        cart.forEach((p) => {
          const priceExists = p.price !== null && p.price !== undefined;
          const priceText = priceExists
            ? p.price + " FCFA"
            : "Prix sur demande";
          const qty = p.qty || 0;

          // Calcul du sous-total pour le produit
          const subtotal = priceExists ? p.price * qty : 0;
          total += subtotal;

          // Ajouter le sous-total dans le message
          msg += `${qty}x ${p.name} — ${priceText} — Sous-total: ${subtotal} FCFA%0A`;
        });

        msg += `%0ATotal estimé : ${total} FCFA%0A%0A`;

        let formTitle = "";

        if (type === "delivery") {
          formTitle = "Informations de livraison";
          const name = document.getElementById("deliveryName").value;
          const phone = document.getElementById("deliveryPhone").value;
          const country = document.getElementById("deliveryCountry").value;
          const address = document.getElementById("deliveryAddress").value;
          const time = document.getElementById("deliveryTime").value;
          msg += `${formTitle}%0ANom : ${name}%0ANuméro : ${phone}%0APays : ${country}%0AAdresse : ${address}%0AHeure : ${time}`;
          closePopup("popupDelivery");
        } else {
          formTitle = "Informations rendez-vous";
          const name = document.getElementById("appointmentName").value;
          const phone = document.getElementById("appointmentPhone").value;
          const country = document.getElementById("appointmentCountry").value;
          const dateTime = document.getElementById("appointmentDateTime").value;
          msg += `${formTitle}%0ANom : ${name}%0ANuméro : ${phone}%0APays : ${country}%0ADate et heure RDV : ${dateTime}`;
          closePopup("popupAppointment");
        }

        if (!name || !phone) {
          alert("Veuillez remplir votre nom et numéro");
          return;
        }

        window.open(`https://wa.me/${settings.whatsappNumber}?text=${msg}`);
      }
      render();

      function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem("cart") || "[]");
        const totalQty = cart.reduce((sum, p) => sum + (p.qty || 0), 0);
        const countElem = document.getElementById("cartCount");
        if (countElem) countElem.textContent = totalQty;
      }
    </script>
  </body>
</html>
