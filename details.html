<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1e293b" />

    <title>Détails Produit</title>

    <style>
      * {
        box-sizing: border-box;
      }

      /* ================= GLOBAL ================= */
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont;
        background: var(--bg);
        overflow-x: hidden;
        color: var(--text);
      }

      /* ================= HEADER ================= */
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--header-bg);
        padding: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      header h1 {
        margin: 0;
        font-size: 18px;
        flex: 1;
        text-align: center;
        color: var(--header-text);
      }

      .back-btn {
        border: none;
        background: transparent;
        font-size: 20px;
        cursor: pointer;
      }

      /* ================= CAROUSEL ================= */
      .carousel-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin: 12px auto;
      }

      .arrow {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: var(--price-color);
        color: #fff;
        font-size: 22px;
        cursor: pointer;
      }

      .carousel {
        width: 90%;
        max-width: 340px;
        aspect-ratio: 1 / 1;
        border-radius: 16px;
        background: var(--card-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .carousel img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: none; /* 🔥 IMPORTANT */
      }

      .carousel img.active {
        display: block;
      }

      /* ================= CARD ================= */
      .card {
        background: var(--card-bg);
        margin: 10px;
        border-radius: 12px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 100%;
        overflow: hidden;
      }

      .card h2 {
        margin: 0;
        font-size: 18px;
        word-break: break-word;
        color: var(--title-color);
      }

      .price {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .price s {
        color: var(--price-old, #888);
      }
      .price b {
        color: var(--price-color);
        font-size: 20px;
      }

      .promo-tag {
        background: var(--promo-bg, #ff3b3b);
        color: var(--promo-text, #fff);
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        width: max-content;
      }

      .desc {
        width: 100%;
        max-width: 100%;
        line-height: 1.5;
        word-break: break-word;
        overflow-wrap: anywhere;
        color: var(--desc-color);
      }

      /* ================= FLOAT BUTTONS ================= */
      .float-btn {
        position: fixed;
        bottom: 16px;
        padding: 14px 18px;
        border-radius: 50px;
        font-weight: 600;
        font-size: 16px;
        border: none;
        cursor: pointer;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
        z-index: 1000;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .float-whatsapp {
        right: 16px;
        background: var(--whatsapp-color);
      }
      .float-call {
        left: 16px;
        background: var(--call-color);
        justify-content: center;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        font-size: 22px;
        padding: 0;
      }

      @media (max-width: 600px) {
        .carousel {
          width: 80%;
          height: 330px;
        }
      }

      /* ================= TABLETTE ================= */
      @media (min-width: 768px) and (max-width: 1023px) {
        header h1 {
          font-size: 28px;
        }

        .back-btn {
          font-size: 30px;
        }

        .carousel {
          max-width: 480px;
          width: 800px;
          height: 600px;
        }

        .arrow {
          width: 60px;
          height: 60px;
          font-size: 50px;
        }

        .card {
          max-width: 800px;
          margin: 30px auto;
          padding: 20px;
        }
        /* ===== TITRE PRODUIT ===== */
        .card h2 {
          font-size: 25px;
        }

        /* ===== PRIX ===== */
        .price b {
          font-size: 30px;
        }

        .price s {
          font-size: 20px;
        }

        .promo-tag {
          font-size: 15px;
          padding: 6px 14px;
        }
        /* ===== DESCRIPTION ===== */
        .desc {
          font-size: 20px;
        }

        /* ===== BOUTONS FLOTTANTS ===== */
        .float-btn {
          font-size: 20px;
          padding: 20px 28px;
        }

        .float-call {
          width: 70px;
          height: 70px;
          font-size: 26px;
        }
      }

      /* ================= DESKTOP ================= */
      @media (min-width: 1024px) {
        header h1 {
          font-size: 50px;
        }

        .float-btn {
          font-size: 26px;
        }

        .back-btn {
          font-size: 26px;
        }

        .float-call {
          width: 64px;
          height: 64px;
          font-size: 26px;
        }

        .carousel-wrap {
          max-width: 1100px;
          margin: 40px auto;
          gap: 40px;
        }

        .carousel {
          max-width: 500px;
        }

        .arrow {
          width: 60px;
          height: 60px;
          font-size: 30px;
        }

        /* Mise en page 2 colonnes */
        .card {
          max-width: 500px;
          margin: 0;
          padding: 24px;
        }

        /* On place image + card côte à côte */
        body {
          display: block;
        }

        .desktop-layout {
          display: flex;
          justify-content: center;
          align-items: flex-start;
          gap: 60px;
          max-width: 1200px;
          margin: 40px auto;
        }

        .card h2 {
          font-size: 30px;
        }

        .price b {
          font-size: 30px;
        }
        .price s {
          font-size: 18px;
        }

        .promo-tag {
          font-size: 16px;
          padding: 8px 16px;
        }

        .desc {
          font-size: 20px;
          line-height: 1.7;
        }

        /* ===== BOUTONS FLOTTANTS ===== */
        .float-btn {
          font-size: 20px;
          padding: 18px 26px;
        }

        .float-call {
          width: 70px;
          height: 70px;
          font-size: 30px;
        }
      }

      /* ================= DESKTOP -layout ================= */
      @media (min-width: 1024px) {
        .desktop-layout {
          display: flex;
          gap: 40px;
          max-width: 1100px;
          margin: 30px auto;
          align-items: flex-start;
        }

        .carousel-wrap {
          flex: 1;
        }

        .carousel {
          width: 100%;
          height: 420px;
        }

        .card {
          flex: 1;
          margin: 0;
        }
      }

      .add-cart-btn {
        position: fixed;

        bottom: 16px;
        right: 16px;

        padding: 16px 22px;

        border: none;
        border-radius: 50px;

        background: var(--primary);
        color: white;

        font-size: 16px;
        font-weight: 600;

        cursor: pointer;

        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);

        z-index: 1200;

        display: flex;
        align-items: center;
        gap: 8px;
      }

      .cart-btn {
        position: relative;
      }

      .cart-count {
        position: absolute;
        top: -6px;
        right: -8px;

        background: red;
        color: white;

        font-size: 11px;
        font-weight: bold;

        padding: 2px 6px;
        border-radius: 50px;

        min-width: 16px;
        text-align: center;
      }

      .toast {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%) translateY(40px);

        background: #222;
        color: white;

        padding: 12px 20px;
        border-radius: 30px;

        font-size: 14px;
        font-weight: 500;

        opacity: 0;
        pointer-events: none;

        transition: all 0.3s ease;

        z-index: 2000;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>

  <body>
    <header>
      <button class="back-btn" onclick="history.back()">←</button>
      <h1 id="siteName">Nom Entreprise</h1>
      <button
        id="headerCartBtn"
        class="back-btn cart-btn"
        style="margin-left: auto"
      >
        🛒
        <span id="cartCount" class="cart-count">0</span>
      </button>
    </header>

    <div class="desktop-layout">
      <div class="carousel-wrap">
        <button class="arrow" onclick="prev()">‹</button>
        <div class="carousel" id="carousel"></div>
        <button class="arrow" onclick="next()">›</button>
      </div>

      <div class="card">
        <h2 id="name"></h2>
        <span id="promoTag"></span>
        <div class="price" id="price"></div>
        <!-- juste après le prix -->
        <div id="minQty" style="font-size: 13px; opacity: 0.7"></div>
        <!-- <-- Quantité min -->
        <p id="desc" class="desc"></p>
      </div>
    </div>
    <!-- fin desktop-layout -->

    <button id="callBtn" class="float-btn float-call"></button>

    <button id="addCartBtn" class="add-cart-btn">🛒 Ajouter au panier</button>

    <script src="theme.js"></script>
    <script>
      // Empêcher accès sans connexion
      const user = JSON.parse(localStorage.getItem("currentUser"));

      if (!user) {
        window.location.href = "auth.html";
      }
      const settings = JSON.parse(localStorage.getItem("siteSettings") || "{}");
      const currency = settings.currency || "FCFA";
      document.getElementById("siteName").textContent =
        settings.siteName || "Nom Entreprise";

      /* ================= GET PRODUCT ================= */
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      const products = JSON.parse(localStorage.getItem("products") || "[]");
      const product = products[id];

      if (!product) {
        alert("Produit introuvable");
        history.back();
      }

      /* ================= DISPLAY PRODUCT ================= */
      document.getElementById("name").textContent = product.name;
      document.getElementById("desc").textContent = product.desc;

      const promoTag = document.getElementById("promoTag");
      const priceBox = document.getElementById("price");

      const showPrice = product.priceActive !== false;
      const showPromo = product.promoActive !== false && product.promo;

      promoTag.innerHTML = ""; // reset promo

      if (showPrice && showPromo) {
        promoTag.innerHTML = '<span class="promo-tag">🔥 En promo</span>';
        priceBox.innerHTML = `<s>${product.price} ${currency}</s> <b style="color: var(--price-color);">${product.promo} ${currency}</b>`;
      } else if (showPrice) {
        priceBox.innerHTML = `<b style="color: var(--price-color);">${product.price} ${currency}</b>`;
      } else {
        priceBox.innerHTML = `<b style="color: var(--price-color);">Prix sur demande</b>`;
      }

      const minQtyBox = document.getElementById("minQty");

      // Affiche la QMC seulement si minQtyActive est true
      if (product.minQtyActive) {
        minQtyBox.textContent = `Quantité minimum : ${product.minQty}`;
      } else {
        minQtyBox.textContent = "";
      }

      /* ================= CAROUSEL ================= */
      const imgs = [product.main, ...(product.gallery || [])];
      let index = 0;
      const carousel = document.getElementById("carousel");

      carousel.innerHTML = imgs
        .map((i, n) => `<img src="${i}" class="${n === 0 ? "active" : ""}">`)
        .join("");

      function show() {
        document
          .querySelectorAll(".carousel img")
          .forEach((img, i) => img.classList.toggle("active", i === index));
      }
      function next() {
        index = (index + 1) % imgs.length;
        show();
      }
      function prev() {
        index = (index - 1 + imgs.length) % imgs.length;
        show();
      }

      const callBtn = document.getElementById("callBtn");

      callBtn.innerHTML = "📞";
      if (settings.callNumber)
        callBtn.onclick = () => window.open(`tel:${settings.callNumber}`);
      else callBtn.style.display = "none";

      /* ================= APPLY THEME ================= */
      applyTheme();

      document.getElementById("headerCartBtn").onclick = () => {
        window.location.href = "panier.html";
      };

      /* ================= ADD TO CART ================= */

      const addCartBtn = document.getElementById("addCartBtn");

      addCartBtn.onclick = () => {
        let cart = JSON.parse(localStorage.getItem("cart") || "[]");

        // Vérifier si le produit existe déjà par nom
        const exists = cart.some((p) => p.name === product.name);

        if (exists) {
          showToast("Ce produit est déjà dans le panier"); // <-- toast au lieu de alert
          return; // Bloque l'ajout
        }

        // Déterminer le prix à utiliser
        let finalPrice = null;
        if (product.promoActive === true && product.promo != null) {
          finalPrice = product.promo;
        } else if (product.price != null) {
          finalPrice = product.price;
        } else {
          finalPrice = null; // Prix sur demande
        }

        cart.push({
          id: id,
          name: product.name,
          price:
            product.priceActive === false
              ? null // <--- prix désactivé → null
              : product.promoActive === true && product.promo != null
                ? product.promo
                : product.price || null,
          img: product.main,
          qty: product.minQty && product.minQty > 1 ? product.minQty : 1,
        });
        localStorage.setItem("cart", JSON.stringify(cart));

        updateCartCount(); // Met à jour le badge du panier
        showToast();
      };
      function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem("cart") || "[]");
        const totalQty = cart.reduce((sum, p) => sum + (p.qty || 0), 0);
        const countElem = document.getElementById("cartCount");
        if (countElem) countElem.textContent = totalQty;
      }

      updateCartCount();

      function showToast() {
        const toast = document.getElementById("toast");

        toast.classList.add("show");

        setTimeout(() => {
          toast.classList.remove("show");
        }, 2000);
      }
    </script>

    <div id="toast" class="toast">✓ Produit ajouté au panier</div>
  </body>
</html>
